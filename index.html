<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire The Gun 3D</title>
    <link rel="stylesheet" href="style.css">

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>
</head>

<body>

    <!-- MENU -->
    <div id="menu">
        <h1>🔥 FIRE THE GUN 3D</h1>
        <button onclick="startGame()">Start Game</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        ❤️ Health: <span id="health">100</span><br>
        🎯 Kills: <span id="kills">0</span><br>
        ⏱ Time: <span id="timer">60</span>
    </div>

    <script src="function.js"></script>
</body>

</html>
